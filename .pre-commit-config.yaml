repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: "uv run black"
        language: system
        types: [python]
        args: [--config=pyproject.toml]
      - id: ruff
        name: ruff
        entry: "uv run ruff"
        language: system
        types: [python]
        args: [check, --config=pyproject.toml]
      - id: mypy
        name: mypy type check
        entry: "uv run mypy"
        language: system
        types: [python]
        args:
          - --config=pyproject.toml
          - ./
        pass_filenames: false
      - id: isort
        name: isort check
        entry: "uv run isort"
        language: system
        types: [python]
        args:
          - --profile
          - black
          - --check
          - ./
        pass_filenames: false
