# Dukascopy instruments template
# Variables:
# 1. universe_name: descriptive name of the universe
# 2. epics: list of dukascopy instrument strings
# 3. interval: the sampling interval (e.g. 15MIN, 1H, 1D)
# 4. samplingFunction: the fully qualified name of the sampling function
# 5. data_interval_start: start date for sampling
# 6. data_interval_end: end date for sampling
# 7. raw_prices_lib: ArcticDB library for raw prices
"download.{{ universe_name }}":
  depends_on: []
  function: tradingo.sampling.instruments.download_instruments
  symbols_out:
     - "instruments/{{ universe_name }}"
  publish_args:
    write_pickle: true
  params:
    dukascopy_instruments: {{ epics }}
  enabled: {{ TP_INCLUDE_INSTRUMENTS }}

#{% for epic in epics %}
"sample.{{ epic }}":
  depends_on: []
  symbols_out:
   - "{{ raw_prices_lib }}/{{ epic }}.bid"
   - "{{ raw_prices_lib }}/{{ epic }}.ask"
  function: "{{ samplingFunction }}"
  params:
    epic: "{{ epic }}"
    start_date: "{{ data_interval_start }}"
    end_date: "{{ data_interval_end }}"
    interval: "{{ interval.upper() }}"
  publish_args:
    astype: float
#{% endfor %}

"sample.{{ universe_name }}":
  function: tradingo.sampling.ig.create_universe
  params:
    pricelib: "{{ raw_prices_lib }}"
    start_date: "{{ data_interval_start }}"
    end_date: "{{ data_interval_end }}"
    permit_missing: "{{ permit_missing }}"
  depends_on:
  #{%for epic in epics %}
    - "sample.{{ epic }}"
  #{% endfor %}
  symbols_in:
    instruments: "instruments/{{ universe_name }}"
  load_args:
    no_date: true
  publish_args:
    astype: float
  symbols_out:
  #{% for field in ["ask", "mid", "bid"] %}
  #{% for occurence in ["open", "high", "low", "close"] %}
  - prices/{{ universe_name }}.{{ field }}.{{ occurence }}
  #{% endfor %}
  #{% endfor %}
